<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" role="img" aria-label="The Archive — all 20 modules">
  <defs>
    <style><![CDATA[
      .bg     { fill: #faf8f4; }
      .ink    { fill: #1a1a1a; }
      .accent { fill: #b8472a; }
      .mute   { fill: #6b6864; }
      .faint  { fill: #a8a39d; }
      .rule   { stroke: #1a1a1a; stroke-width: 1.2; }
      .hair   { stroke: #c9c2b6; stroke-width: 0.7; }
      .dashed { stroke: #a8a39d; stroke-width: 0.6; stroke-dasharray: 2 3; }
      .label  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.22em; font-size: 11px; text-transform: uppercase; }
      .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.18em; font-size: 9.5px; text-transform: uppercase; }
      .serif-display { font-family: 'Times New Roman', Times, serif; font-weight: 400; }
      .serif-italic  { font-family: 'Times New Roman', Times, serif; font-style: italic; }
      .sans   { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .code   { font-family: 'Times New Roman', Times, serif; fill: #6b6864; font-size: 12px; letter-spacing: 0.04em; }
      .module-name { font-family: 'Times New Roman', Times, serif; fill: #1a1a1a; font-size: 17px; }
      .grade-aplus { font-family: 'Times New Roman', Times, serif; fill: #b8472a; font-style: italic; font-size: 19px; }
      .grade-a    { font-family: 'Times New Roman', Times, serif; fill: #1a1a1a; font-style: italic; font-size: 19px; }
      .grade-aminus { font-family: 'Times New Roman', Times, serif; fill: #1a1a1a; font-style: italic; font-size: 17px; }
      .grade-bplus { font-family: 'Times New Roman', Times, serif; fill: #6b6864; font-style: italic; font-size: 17px; }
      .grade-pend { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #a8a39d; font-style: italic; font-size: 12px; letter-spacing: 0.05em; }
    ]]></style>
  </defs>

  <rect class="bg" width="1400" height="1100"/>

  <!-- section header -->
  <line class="rule" x1="80" y1="50" x2="240" y2="50"/>
  <text class="label ink" x="80" y="78">§ III · The Archive</text>
  <text class="serif-display ink" x="80" y="142" font-size="56" letter-spacing="-1">All twenty-one modules,</text>
  <text class="serif-italic accent" x="80" y="198" font-size="56" letter-spacing="-1">in order of encounter.</text>
  <text class="serif-italic mute" x="80" y="232" font-size="16">From first-year foundations to fourth-year specialisation.</text>

  <!-- Column headers (only at top) -->
  <g transform="translate(80, 290)">
    <line class="rule" x1="0" y1="0" x2="1240" y2="0"/>
    <text class="label-sm mute" x="0"   y="22">Code</text>
    <text class="label-sm mute" x="110" y="22">Module</text>
    <text class="label-sm mute" x="640" y="22">Grade</text>
    <text class="label-sm mute" x="760" y="22">Past Papers</text>
    <text class="label-sm mute" x="900" y="22">Difficulty</text>
    <text class="label-sm mute" x="1080" y="22">Status</text>
    <line class="hair" x1="0" y1="34" x2="1240" y2="34"/>
  </g>

  <!-- ============ YEAR 1 ============ -->
  <g transform="translate(80, 360)">
    <text class="serif-italic faint" x="0" y="0" font-size="14">Year I · Semester 2</text>
    <line class="hair" x1="0" y1="10" x2="1240" y2="10"/>

    <!-- row 1: EE1102 -->
    <text class="code"        x="0"   y="38">EE1102</text>
    <text class="module-name" x="110" y="38">Physics Foundation</text>
    <text class="grade-bplus" x="640" y="38">B+</text>
    <text class="sans ink"    x="760" y="38" font-size="13">4 papers</text>
    <text class="serif-italic mute" x="900" y="38" font-size="13">Challenging</text>
    <text class="sans mute"   x="1080" y="38" font-size="12">—</text>

    <!-- row 2: MH1811 -->
    <text class="code"        x="0"   y="68">MH1811</text>
    <text class="module-name" x="110" y="68">Mathematics 2</text>
    <text class="grade-bplus" x="640" y="68">B+</text>
    <text class="sans faint"  x="760" y="68" font-size="13">— none</text>
    <text class="serif-italic accent" x="900" y="68" font-size="13">Very Challenging</text>
    <text class="sans mute"   x="1080" y="68" font-size="12">—</text>

    <!-- row 3: IE2104 -->
    <text class="code"        x="0"   y="98">IE2104</text>
    <text class="module-name" x="110" y="98">Digital Electronics</text>
    <text class="grade-aminus" x="640" y="98">A−</text>
    <text class="sans ink"    x="760" y="98" font-size="13">3 papers</text>
    <text class="serif-italic mute" x="900" y="98" font-size="13">Moderate</text>
    <text class="sans mute"   x="1080" y="98" font-size="12">—</text>

    <!-- row 4: IE0005 -->
    <text class="code"        x="0"   y="128">IE0005</text>
    <text class="module-name" x="110" y="128">Intro to Data Science &amp; AI</text>
    <text class="grade-aminus" x="640" y="128">A−</text>
    <text class="sans faint"  x="760" y="128" font-size="13">— lab-based</text>
    <text class="serif-italic mute" x="900" y="128" font-size="13">Moderate</text>
    <text class="sans mute"   x="1080" y="128" font-size="12">quiz bank ✓</text>

    <line class="dashed" x1="0" y1="148" x2="1240" y2="148"/>
  </g>

  <!-- ============ YEAR 2 ============ -->
  <g transform="translate(80, 530)">
    <text class="serif-italic faint" x="0" y="0" font-size="14">Year II · Semesters 1 + 2</text>
    <line class="hair" x1="0" y1="10" x2="1240" y2="10"/>

    <text class="code"        x="0"   y="38">EE2101</text>
    <text class="module-name" x="110" y="38">Circuit Analysis</text>
    <text class="grade-a"     x="640" y="38">A</text>
    <text class="sans ink"    x="760" y="38" font-size="13">4 papers</text>
    <text class="serif-italic mute" x="900" y="38" font-size="13">Challenging</text>

    <text class="code"        x="0"   y="68">EE2103</text>
    <text class="module-name" x="110" y="68">Semiconductor Fundamentals</text>
    <text class="grade-bplus" x="640" y="68">B+</text>
    <text class="sans ink"    x="760" y="68" font-size="13">5 papers</text>
    <text class="serif-italic mute" x="900" y="68" font-size="13">Challenging</text>

    <text class="code"        x="0"   y="98">IE2106</text>
    <text class="module-name" x="110" y="98">Engineering Mathematics 1</text>
    <text class="grade-a"     x="640" y="98">A</text>
    <text class="sans ink"    x="760" y="98" font-size="13">4 papers</text>
    <text class="serif-italic mute" x="900" y="98" font-size="13">Challenging</text>

    <text class="code"        x="0"   y="128">IE2110</text>
    <text class="module-name" x="110" y="128">Signals and Systems</text>
    <text class="grade-aminus" x="640" y="128">A−</text>
    <text class="sans ink"    x="760" y="128" font-size="13">6 papers</text>
    <text class="serif-italic mute" x="900" y="128" font-size="13">Moderate</text>

    <text class="code"        x="0"   y="158">EE2005</text>
    <text class="module-name" x="110" y="158">Electrical Devices &amp; Machines</text>
    <text class="grade-aplus" x="640" y="158">A+</text>
    <text class="sans ink"    x="760" y="158" font-size="13">4 papers</text>
    <text class="serif-italic mute" x="900" y="158" font-size="13">Moderate</text>

    <text class="code"        x="0"   y="188">EE2073</text>
    <text class="module-name" x="110" y="188">Intro to EEE Project</text>
    <text class="grade-aminus" x="640" y="188">A−</text>
    <text class="sans faint"  x="760" y="188" font-size="13">— lab-based</text>
    <text class="serif-italic mute" x="900" y="188" font-size="13">Easy–Moderate</text>

    <text class="code"        x="0"   y="218">EE2102</text>
    <text class="module-name" x="110" y="218">Analog Electronics</text>
    <text class="grade-aplus" x="640" y="218">A+</text>
    <text class="sans ink"    x="760" y="218" font-size="13">5 papers</text>
    <text class="serif-italic accent" x="900" y="218" font-size="13">Very Challenging</text>

    <text class="code"        x="0"   y="248">IE2107</text>
    <text class="module-name" x="110" y="248">Engineering Mathematics 2</text>
    <text class="grade-bplus" x="640" y="248">B+</text>
    <text class="sans ink"    x="760" y="248" font-size="13">3 papers</text>
    <text class="serif-italic accent" x="900" y="248" font-size="13">Very Challenging</text>

    <text class="code"        x="0"   y="278">IE2108</text>
    <text class="module-name" x="110" y="278">Data Structures &amp; Analysis</text>
    <text class="grade-aplus" x="640" y="278">A+</text>
    <text class="sans ink"    x="760" y="278" font-size="13">4 papers</text>
    <text class="serif-italic accent" x="900" y="278" font-size="13">Very Challenging</text>

    <line class="dashed" x1="0" y1="298" x2="1240" y2="298"/>
  </g>

  <!-- ============ YEAR 3 ============ -->
  <g transform="translate(80, 860)">
    <text class="serif-italic faint" x="0" y="0" font-size="14">Year III · Semester 1</text>
    <line class="hair" x1="0" y1="10" x2="1240" y2="10"/>

    <text class="code"        x="0"   y="38">EE3101</text>
    <text class="module-name" x="110" y="38">Engineering Electromagnetics</text>
    <text class="grade-a"     x="640" y="38">A</text>
    <text class="sans ink"    x="760" y="38" font-size="13">8 papers ★</text>
    <text class="serif-italic accent" x="900" y="38" font-size="13">Very Challenging</text>

    <text class="code"        x="0"   y="68">EE3015</text>
    <text class="module-name" x="110" y="68">Power System &amp; Conversion</text>
    <text class="grade-aplus" x="640" y="68">A+</text>
    <text class="sans ink"    x="760" y="68" font-size="13">7 papers</text>
    <text class="serif-italic accent" x="900" y="68" font-size="13">Very Challenging</text>

    <text class="code"        x="0"   y="98">EE3011</text>
    <text class="module-name" x="110" y="98">Modelling &amp; Control</text>
    <text class="grade-aplus" x="640" y="98">A+</text>
    <text class="sans ink"    x="760" y="98" font-size="13">6 papers</text>
    <text class="serif-italic mute" x="900" y="98" font-size="13">Moderate</text>

    <line class="dashed" x1="0" y1="118" x2="1240" y2="118"/>
  </g>

  <!-- ============ YEAR 4 — see section IV ============ -->
  <g transform="translate(80, 1020)">
    <text class="serif-italic accent" x="0" y="0" font-size="14">Year IV · power &amp; clean energy specialisation</text>
    <text class="sans mute" x="380" y="0" font-size="12">→ five modules detailed in § IV below</text>
    <line class="rule accent" x1="0" y1="10" x2="1240" y2="10"/>
  </g>

  <line class="hair" x1="80" y1="1080" x2="1320" y2="1080"/>
</svg>
