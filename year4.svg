<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1180" role="img" aria-label="Year IV — Power Engineering Specialisation">
  <defs>
    <style><![CDATA[
      .bg     { fill: #f3ede0; }
      .ink    { fill: #1a1a1a; }
      .accent { fill: #b8472a; }
      .mute   { fill: #6b6864; }
      .faint  { fill: #a8a39d; }
      .rule   { stroke: #1a1a1a; stroke-width: 1.2; }
      .hair   { stroke: #b8aa92; stroke-width: 0.7; }
      .dashed { stroke: #8a8273; stroke-width: 0.7; stroke-dasharray: 3 4; }
      .label  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.22em; font-size: 11px; text-transform: uppercase; }
      .label-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.18em; font-size: 10px; text-transform: uppercase; }
      .serif-display { font-family: 'Times New Roman', Times, serif; font-weight: 400; }
      .serif-italic  { font-family: 'Times New Roman', Times, serif; font-style: italic; }
      .sans   { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .code   { font-family: 'Times New Roman', Times, serif; fill: #6b6864; font-size: 12px; letter-spacing: 0.04em; }
      .grade-a    { font-family: 'Times New Roman', Times, serif; fill: #1a1a1a; font-style: italic; font-size: 19px; }
      .grade-aminus { font-family: 'Times New Roman', Times, serif; fill: #1a1a1a; font-style: italic; font-size: 17px; }
      .grade-pend { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #a8a39d; font-style: italic; font-size: 12px; letter-spacing: 0.05em; }
      .pill-outline { fill: none; stroke: #b8472a; stroke-width: 1; }
      .pill-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.18em; font-size: 9px; fill: #b8472a; text-transform: uppercase; }
    ]]></style>
  </defs>

  <rect class="bg" width="1400" height="1180"/>

  <!-- section header -->
  <line class="rule accent" x1="80" y1="50" x2="240" y2="50"/>
  <text class="label accent" x="80" y="78">§ IV · Year IV</text>

  <text class="serif-display ink" x="80" y="146" font-size="60" letter-spacing="-1.2">The power &amp; clean</text>
  <text class="serif-italic accent" x="80" y="208" font-size="60" letter-spacing="-1.2">energy specialisation.</text>

  <text class="serif-italic mute" x="80" y="248" font-size="17">
    Five advanced electives. 40 past papers worked through. AY 2025/26.
  </text>

  <!-- Right column: top-line summary -->
  <g transform="translate(1000, 110)">
    <line class="hair" x1="0" y1="0" x2="0" y2="160"/>
    <text class="label mute" x="20" y="14">The Year IV figures</text>

    <text class="serif-display ink" x="20" y="62" font-size="40" letter-spacing="-0.5">5</text>
    <text class="sans mute" x="60" y="62" font-size="13">modules · 15 AU total</text>

    <text class="serif-display ink" x="20" y="100" font-size="40" letter-spacing="-0.5">40</text>
    <text class="sans mute" x="68" y="100" font-size="13">past papers worked</text>

    <text class="serif-display ink" x="20" y="138" font-size="40" letter-spacing="-0.5">2</text>
    <text class="sans mute" x="50" y="138" font-size="13">confirmed: <tspan class="serif-italic accent">A</tspan> · <tspan class="serif-italic ink">A−</tspan></text>
  </g>

  <!-- column headers -->
  <g transform="translate(80, 310)">
    <line class="rule" x1="0" y1="0" x2="1240" y2="0"/>
    <text class="label-sm mute" x="0"   y="22">Code</text>
    <text class="label-sm mute" x="110" y="22">Module</text>
    <text class="label-sm mute" x="640" y="22">Grade</text>
    <text class="label-sm mute" x="760" y="22">Past Papers</text>
    <text class="label-sm mute" x="900" y="22">Assessment Notes</text>
    <line class="hair" x1="0" y1="34" x2="1240" y2="34"/>
  </g>

  <!-- ============ Semester 1 ============ -->
  <g transform="translate(80, 380)">
    <text class="serif-italic faint" x="0" y="0" font-size="14">Semester 1</text>
    <line class="hair" x1="0" y1="10" x2="1240" y2="10"/>

    <!-- EE4530 -->
    <text class="code" x="0" y="40">EE4530</text>
    <text class="sans mute" x="0" y="58" font-size="10">3 AU</text>
    <text class="serif-display ink" x="110" y="40" font-size="19">Power Systems Analysis &amp; Control</text>
    <text class="serif-italic mute" x="110" y="62" font-size="12.5">Quizzes 20% · Assignments 15% · Exam 60%</text>
    <text class="grade-a" x="640" y="40">A</text>
    <text class="sans ink" x="760" y="40" font-size="13">10 papers ★</text>
    <text class="sans mute" x="760" y="60" font-size="11">2017/18 → 2024/25</text>
    <text class="sans mute" x="900" y="40" font-size="12">Past-year quizzes · 2 assignment answers</text>
    <text class="sans faint" x="900" y="58" font-size="11">Chap 12 not covered</text>

    <line class="dashed" x1="0" y1="92" x2="1240" y2="92"/>

    <!-- EE4523 -->
    <text class="code" x="0" y="130">EE4523</text>
    <text class="sans mute" x="0" y="148" font-size="10">3 AU</text>
    <text class="serif-display ink" x="110" y="130" font-size="19">Power Engineering Design</text>
    <text class="serif-italic mute" x="110" y="152" font-size="12.5">Assignment 20% · Examination 50%</text>
    <text class="grade-aminus" x="640" y="130">A−</text>
    <text class="sans ink" x="760" y="130" font-size="13">8 papers</text>
    <text class="sans mute" x="760" y="150" font-size="11">2017/18 → 2024/25</text>
    <text class="sans mute" x="900" y="130" font-size="12">Full assignment answer included</text>
  </g>

  <!-- ============ Semester 2 ============ -->
  <g transform="translate(80, 600)">
    <line class="dashed" x1="0" y1="0" x2="1240" y2="0"/>
    <text class="serif-italic faint" x="0" y="28" font-size="14">Semester 2</text>
    <line class="hair" x1="0" y1="38" x2="1240" y2="38"/>

    <!-- EE4533 -->
    <text class="code" x="0" y="68">EE4533</text>
    <text class="sans mute" x="0" y="86" font-size="10">3 AU</text>
    <text class="serif-display ink" x="110" y="68" font-size="19">Power Apparatus &amp; System Protection</text>
    <text class="serif-italic mute" x="110" y="90" font-size="12.5">Quiz + Research × 4 (40%) · Exam 60%</text>
    <rect class="pill-outline" x="640" y="54" width="86" height="18" rx="9"/>
    <text class="pill-text" x="683" y="67" text-anchor="middle">Pending</text>
    <text class="sans ink" x="760" y="68" font-size="13">5 papers</text>
    <text class="sans mute" x="760" y="88" font-size="11">2020/21 → 2024/25</text>
    <text class="sans mute" x="900" y="68" font-size="12">All 4 assignment answers · 25/26-Q quiz paper</text>

    <line class="dashed" x1="0" y1="118" x2="1240" y2="118"/>

    <!-- EE4534 -->
    <text class="code" x="0" y="156">EE4534</text>
    <text class="sans mute" x="0" y="174" font-size="10">3 AU</text>
    <text class="serif-display ink" x="110" y="156" font-size="19">Modern Distribution Systems with Renewable Resources</text>
    <text class="serif-italic mute" x="110" y="178" font-size="12.5">Quizzes 20% · Assignments 20% · Exam 60%</text>
    <text class="grade-pend" x="640" y="156" font-size="12">grade pending</text>
    <text class="sans ink" x="760" y="156" font-size="13">7 papers</text>
    <text class="sans mute" x="760" y="176" font-size="11">2017/18 → 2024/25</text>
    <text class="sans mute" x="900" y="156" font-size="12">Past quizzes (W5 + W11) · 2 assignment answers</text>

    <line class="dashed" x1="0" y1="206" x2="1240" y2="206"/>

    <!-- EE4524 -->
    <text class="code" x="0" y="244">EE4524</text>
    <text class="sans mute" x="0" y="262" font-size="10">3 AU</text>
    <text class="serif-display ink" x="110" y="244" font-size="19">Design of Clean Energy Systems</text>
    <text class="serif-italic mute" x="110" y="266" font-size="12.5">Home assignment 50% · Finals 50%</text>
    <text class="grade-pend" x="640" y="244" font-size="12">grade pending</text>
    <text class="sans ink" x="760" y="244" font-size="13">7 papers</text>
    <text class="sans mute" x="760" y="264" font-size="11">Wind + Solar tracks</text>
    <text class="sans mute" x="900" y="244" font-size="12">Full wind assignment · PLECS sims (all classes)</text>
  </g>

  <!-- highlight box: what makes Year 4 different -->
  <g transform="translate(80, 940)">
    <line class="rule accent" x1="0" y1="0" x2="60" y2="0"/>
    <text class="label accent" x="0" y="26">Why Year IV is different</text>
    <text class="serif-italic ink" x="0" y="68" font-size="22" letter-spacing="-0.2">
      <tspan x="0" dy="0">These are the modules with the thinnest</tspan>
      <tspan x="0" dy="30">existing notes ecosystem.</tspan>
    </text>
    <text class="sans mute" x="0" y="158" font-size="14">
      <tspan x="0" dy="0">Year 1–3 notes circulate widely. Year 4 power electives don't —</tspan>
      <tspan x="0" dy="20">most seniors don't share, and bundles online stop at Year 3.</tspan>
      <tspan x="0" dy="20">This archive fills that gap.</tspan>
    </text>
  </g>

  <!-- right side callout for clean energy systems -->
  <g transform="translate(820, 940)">
    <line class="hair" x1="0" y1="0" x2="500" y2="0"/>
    <text class="label mute" x="0" y="26">A note on EE4524</text>
    <text class="serif-italic ink" x="0" y="62" font-size="16" letter-spacing="0.1">
      <tspan x="0" dy="0">Includes complete PLECS simulation files</tspan>
      <tspan x="0" dy="22">with waveform results for every class —</tspan>
      <tspan x="0" dy="22">wind, solar, and reading notes throughout.</tspan>
    </text>
    <text class="sans mute" x="0" y="158" font-size="12">
      The single most labour-intensive Year IV deliverable.
    </text>
  </g>

  <line class="hair" x1="80" y1="1140" x2="1320" y2="1140"/>
</svg>
