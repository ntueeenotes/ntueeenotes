<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 380" role="img" aria-label="By the numbers">
  <defs>
    <style><![CDATA[
      .bg     { fill: #faf8f4; }
      .ink    { fill: #1a1a1a; }
      .accent { fill: #b8472a; }
      .mute   { fill: #6b6864; }
      .rule   { stroke: #1a1a1a; stroke-width: 1.2; }
      .hair   { stroke: #c9c2b6; stroke-width: 0.8; }
      .label  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.22em; font-size: 11px; text-transform: uppercase; }
      .serif-display { font-family: 'Times New Roman', Times, serif; font-weight: 400; }
      .serif-italic  { font-family: 'Times New Roman', Times, serif; font-style: italic; }
      .sans   { font-family: 'Helvetica Neue', Arial, sans-serif; }
    ]]></style>
  </defs>

  <rect class="bg" width="1400" height="380"/>

  <!-- section label -->
  <line class="rule" x1="80" y1="50" x2="240" y2="50"/>
  <text class="label ink" x="80" y="78">§ I · By the Numbers</text>
  <text class="serif-italic mute" x="80" y="108" font-size="18">An accounting.</text>

  <!-- four vertical columns separated by hairlines -->
  <line class="hair" x1="370" y1="160" x2="370" y2="320"/>
  <line class="hair" x1="670" y1="160" x2="670" y2="320"/>
  <line class="hair" x1="970" y1="160" x2="970" y2="320"/>

  <!-- Column 1 -->
  <text class="label mute" x="100" y="180">Modules</text>
  <text class="serif-display ink" x="100" y="270" font-size="96" letter-spacing="-2">21</text>
  <text class="sans mute" x="100" y="300" font-size="13">across Year 1 to Year 4 EEE</text>

  <!-- Column 2 -->
  <text class="label mute" x="400" y="180">Past papers</text>
  <text class="serif-display ink" x="400" y="270" font-size="96" letter-spacing="-2">100<tspan class="accent">+</tspan></text>
  <text class="sans mute" x="400" y="300" font-size="13">each with full step-by-step solutions</text>

  <!-- Column 3 -->
  <text class="label mute" x="700" y="180">A / A+ grades</text>
  <text class="serif-display ink" x="700" y="270" font-size="96" letter-spacing="-2">9<tspan class="mute" font-size="40">/16</tspan></text>
  <text class="sans mute" x="700" y="300" font-size="13">among graded modules</text>

  <!-- Column 4 -->
  <text class="label mute" x="1000" y="180">Focus track</text>
  <text class="serif-display ink" x="1000" y="248" font-size="40" letter-spacing="-1">Power</text>
  <text class="serif-italic accent" x="1000" y="288" font-size="32">&amp; clean energy</text>
  <text class="sans mute" x="1000" y="312" font-size="13">specialisation through Year 4</text>

  <!-- foot rule -->
  <line class="hair" x1="80" y1="350" x2="1320" y2="350"/>
</svg>
